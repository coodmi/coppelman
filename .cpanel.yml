---
deployment:
  tasks:
    - export DEPLOYPATH=/home/buddydev/coppelman.buddydevs.com
    - export PATH=$PATH:/usr/local/bin:/usr/bin:/opt/cpanel/ea-nodejs20/bin
    - npm install
    - npm run build
    - cp -r dist/. $DEPLOYPATH
    - cp .htaccess $DEPLOYPATH/.htaccess
    - mkdir -p $DEPLOYPATH/api
    - mkdir -p $DEPLOYPATH/api/uploads
    - cp api/data.php $DEPLOYPATH/api/data.php
    - cp api/upload.php $DEPLOYPATH/api/upload.php
    - chmod 755 $DEPLOYPATH/api/uploads
    - touch $DEPLOYPATH/api/db.json
    - chmod 644 $DEPLOYPATH/api/db.json
